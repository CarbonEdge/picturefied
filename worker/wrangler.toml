name = "picturefied-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret config — secrets (JWT_SECRET) set via `wrangler secret put`
APP_NAME = "Picturefied"
API_DOMAIN = "http://localhost:8787"
WEBSITE_DOMAIN = "http://localhost:5173"
GOOGLE_CLIENT_ID = ""  # also set as GitHub Actions variable

[[d1_databases]]
binding = "DB"
database_name = "picturefied"
database_id = ""  # set after: wrangler d1 create picturefied

[[kv_namespaces]]
binding = "SESSIONS"
id = ""  # set after: wrangler kv namespace create SESSIONS

[[kv_namespaces]]
binding = "TAG_INDEX"
id = ""  # set after: wrangler kv namespace create TAG_INDEX

[[kv_namespaces]]
binding = "FEED_CACHE"
id = ""  # set after: wrangler kv namespace create FEED_CACHE

[dev]
port = 8787
