services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: picturefied
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: picturefied
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picturefied"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      valkey:   { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://picturefied:${POSTGRES_PASSWORD:-changeme}@postgres:5432/picturefied
      REDIS_URL: redis://valkey:6379
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      DOMAIN: ${DOMAIN:-localhost}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_ROOT: /data/files
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      INVITE_ONLY: ${INVITE_ONLY:-false}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2147483648}
      PORT: 8787
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - files-data:/data/files
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost:3000}/api/v1
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  valkey-data:
  files-data:
  caddy-data:
  caddy-config:
